{{ define "main" }}
<section class="section-head">
  <h1>{{ .Title }}</h1>
</section>

<section class="post-list">
  {{ range .Pages }}
  <article class="card">
    <p class="meta">{{ .Date.Format "2006-01-02" }}</p>
    <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
    {{ with .Description }}<p>{{ . }}</p>{{ end }}
  </article>
  {{ end }}
</section>
{{ end }}
