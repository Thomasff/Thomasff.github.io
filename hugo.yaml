baseURL: https://Thomasff.github.io/
locale: zh-cn
title: Thomasff Blog
theme: hugo-theme-stack
defaultContentLanguage: zh-cn
hasCJKLanguage: true

pagination:
  pagerSize: 10

permalinks:
  post: /p/:slug/
  page: /:slug/

taxonomies:
  category: categories
  tag: tags

module:
  mounts:
    - source: archetypes
      target: archetypes
    - source: assets
      target: assets
    - source: content
      target: content
    - source: data
      target: data
    - source: i18n
      target: i18n
    - source: static
      target: static

params:
  mainSections:
    - post
  featuredImageField: image
  rssFullContent: true
  favicon: /img/avatar.png

  footer:
    since: 2026

  sidebar:
    emoji: ""
    subtitle: 记录开发、阅读和思考
    avatar: /img/avatar.png

  article:
    math: false
    toc: true
    readingTime: true

  widgets:
    homepage:
      - type: search
      - type: archives
        params:
          limit: 8
      - type: categories
        params:
          limit: 10
      - type: tag-cloud
        params:
          limit: 20
    page:
      - type: toc

menu:
  main: []
  social:
    - identifier: github
      name: GitHub
      url: https://github.com/Thomasff
      params:
        icon: brand-github

markup:
  goldmark:
    renderer:
      unsafe: true
